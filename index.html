<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f2ed;
    --cream: #ede9e2;
    --accent: #c8440a;
    --accent-light: #f0d4c8;
    --muted: #7a7570;
    --border: #d4cfc8;
    --success: #2d6a4f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.6;
  }

  header {
    padding: 3rem 4rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 4rem 6rem;
  }

  /* API Key bar */
  .api-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 0.875rem 1.25rem;
    margin-bottom: 3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
  }

  .api-bar label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .api-bar input {
    flex: 1;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink);
    outline: none;
  }

  .api-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .api-status.ready { background: var(--success); }

  /* Section labels */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Brief section */
  .brief-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 3rem;
  }

  .brief-grid .full { grid-column: 1 / -1; }

  .field-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    padding: 0.875rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  /* Candidates */
  .candidates-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  .candidate-card {
    background: white;
    border: 1px solid var(--border);
    padding: 1.5rem;
    position: relative;
  }

  .candidate-card .card-num {
    position: absolute;
    top: -1px; right: -1px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.5rem;
    letter-spacing: 0.1em;
  }

  .candidate-card .field-group { margin-bottom: 1rem; }
  .candidate-card .field-group:last-child { margin-bottom: 0; }

  .candidate-card textarea { min-height: 90px; }

  /* Run button */
  .run-area {
    display: flex;
    justify-content: center;
    margin-bottom: 4rem;
  }

  .run-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 1.1rem 3.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .run-btn:hover { background: var(--accent); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .run-btn .btn-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(245,242,237,0.3);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .run-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  #results { display: none; }
  #results.visible { display: block; animation: fadeUp 0.5s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .results-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-style: italic;
  }

  .results-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Candidate result cards */
  .result-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  .result-card {
    border: 1px solid var(--border);
    background: white;
    overflow: hidden;
  }

  .result-card-header {
    background: var(--ink);
    color: var(--paper);
    padding: 0.875rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .result-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
  }

  .result-card-score {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    opacity: 0.7;
  }

  .result-card-body {
    padding: 1.25rem;
    font-size: 0.875rem;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
  }

  .result-card-body strong {
    font-weight: 500;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-top: 0.875rem;
    margin-bottom: 0.25rem;
  }

  .result-card-body strong:first-child { margin-top: 0; }

  /* Outreach section */
  .outreach-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .outreach-card {
    border: 1px solid var(--border);
    background: var(--cream);
  }

  .outreach-card-header {
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .outreach-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 0.25rem 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .outreach-body {
    padding: 1.25rem;
    font-size: 0.85rem;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
  }

  /* Error */
  .error-box {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    padding: 1rem 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: #dc2626;
    display: none;
    margin-bottom: 2rem;
  }

  .error-box.visible { display: block; }

  /* Recommendation banner */
  .recommendation {
    background: var(--accent);
    color: white;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .recommendation-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.8;
    white-space: nowrap;
  }

  .recommendation-text {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.5;
  }

  @media (max-width: 900px) {
    header { padding: 2rem; }
    main { padding: 2rem; }
    .brief-grid { grid-template-columns: 1fr; }
    .candidates-grid, .result-cards, .outreach-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Cast<span>Match</span></div>
  <div class="tagline">AI-powered casting analysis &amp; outreach</div>
</header>

<main>

  <!-- API Key -->
  <div class="api-bar">
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="checkApiKey()" />
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- Brief -->
  <div class="section-label">Role Brief</div>
  <div class="brief-grid">
    <div class="field-group full">
      <label>Production &amp; Role Description</label>
      <textarea id="roleDesc" rows="3" placeholder="e.g. Contemporary dance production — female lead, mid-20s to mid-30s. Must convey emotional vulnerability and technical precision. Strong contemporary background required."></textarea>
    </div>
    <div class="field-group">
      <label>Key Skills Required</label>
      <textarea id="keySkills" rows="3" placeholder="e.g. Contemporary technique, improvisation, physical theatre, experience with live music collaboration..."></textarea>
    </div>
    <div class="field-group">
      <label>Rehearsal &amp; Availability Dates</label>
      <textarea id="dates" rows="3" placeholder="e.g. Rehearsals: 14–28 April (weekdays), 3–5 May (full days). Premiere: 10 May. Must be available all dates."></textarea>
    </div>
  </div>

  <!-- Candidates -->
  <div class="section-label">Candidates</div>
  <div class="candidates-grid">
    <div class="candidate-card" id="card1">
      <div class="card-num">01</div>
      <div class="field-group">
        <label>Name</label>
        <input type="text" id="name1" placeholder="Full name" />
      </div>
      <div class="field-group">
        <label>CV / Background</label>
        <textarea id="cv1" rows="4" placeholder="Training, companies, notable productions, years of experience..."></textarea>
      </div>
      <div class="field-group">
        <label>Physical Specs</label>
        <input type="text" id="specs1" placeholder="e.g. 168cm, size S, shoe 38" />
      </div>
      <div class="field-group">
        <label>Reel / Portfolio Link</label>
        <input type="text" id="reel1" placeholder="https://..." />
      </div>
      <div class="field-group">
        <label>Agent Contact</label>
        <input type="text" id="agent1" placeholder="Agent name, agency, email" />
      </div>
    </div>

    <div class="candidate-card" id="card2">
      <div class="card-num">02</div>
      <div class="field-group">
        <label>Name</label>
        <input type="text" id="name2" placeholder="Full name" />
      </div>
      <div class="field-group">
        <label>CV / Background</label>
        <textarea id="cv2" rows="4" placeholder="Training, companies, notable productions, years of experience..."></textarea>
      </div>
      <div class="field-group">
        <label>Physical Specs</label>
        <input type="text" id="specs2" placeholder="e.g. 172cm, size M, shoe 40" />
      </div>
      <div class="field-group">
        <label>Reel / Portfolio Link</label>
        <input type="text" id="reel2" placeholder="https://..." />
      </div>
      <div class="field-group">
        <label>Agent Contact</label>
        <input type="text" id="agent2" placeholder="Agent name, agency, email" />
      </div>
    </div>

    <div class="candidate-card" id="card3">
      <div class="card-num">03</div>
      <div class="field-group">
        <label>Name</label>
        <input type="text" id="name3" placeholder="Full name" />
      </div>
      <div class="field-group">
        <label>CV / Background</label>
        <textarea id="cv3" rows="4" placeholder="Training, companies, notable productions, years of experience..."></textarea>
      </div>
      <div class="field-group">
        <label>Physical Specs</label>
        <input type="text" id="specs3" placeholder="e.g. 165cm, size XS, shoe 37" />
      </div>
      <div class="field-group">
        <label>Reel / Portfolio Link</label>
        <input type="text" id="reel3" placeholder="https://..." />
      </div>
      <div class="field-group">
        <label>Agent Contact</label>
        <input type="text" id="agent3" placeholder="Agent name, agency, email" />
      </div>
    </div>
  </div>

  <!-- Run -->
  <div class="run-area">
    <button class="run-btn" id="runBtn" onclick="runAnalysis()">
      <div class="spinner" id="spinner"></div>
      <div>
        <div>Analyse Candidates</div>
        <div class="btn-sub">Powered by Claude</div>
      </div>
    </button>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <div class="results-title">Analysis Results</div>
      <div class="results-meta" id="resultsMeta"></div>
    </div>

    <div class="recommendation" id="recommendationBanner">
      <div class="recommendation-label">Recommended</div>
      <div class="recommendation-text" id="recommendationText"></div>
    </div>

    <div class="result-cards" id="resultCards"></div>

    <div class="section-label" style="margin-top:2.5rem;">Agent Outreach Drafts</div>
    <div class="outreach-grid" id="outreachGrid"></div>
  </div>

</main>

<script>
function checkApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  const status = document.getElementById('apiStatus');
  status.className = 'api-status' + (key.startsWith('sk-ant-') ? ' ready' : '');
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('visible');
}

async function runAnalysis() {
  hideError();

  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey.startsWith('sk-ant-')) {
    showError('Please enter a valid Anthropic API key (starts with sk-ant-)');
    return;
  }

  const roleDesc = document.getElementById('roleDesc').value.trim();
  const keySkills = document.getElementById('keySkills').value.trim();
  const dates = document.getElementById('dates').value.trim();

  if (!roleDesc) { showError('Please enter a role description.'); return; }

  const candidates = [1, 2, 3].map(i => ({
    name: document.getElementById(`name${i}`).value.trim(),
    cv: document.getElementById(`cv${i}`).value.trim(),
    specs: document.getElementById(`specs${i}`).value.trim(),
    reel: document.getElementById(`reel${i}`).value.trim(),
    agent: document.getElementById(`agent${i}`).value.trim(),
  })).filter(c => c.name && c.cv);

  if (candidates.length === 0) {
    showError('Please fill in at least one candidate (name + CV/background).');
    return;
  }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('results').classList.remove('visible');

  const prompt = `You are an expert casting director assistant. Analyse the following candidates for a role and provide a structured assessment.

ROLE BRIEF:
${roleDesc}

KEY SKILLS REQUIRED:
${keySkills || 'Not specified'}

REHEARSAL & AVAILABILITY DATES:
${dates || 'Not specified'}

CANDIDATES:
${candidates.map((c, i) => `
CANDIDATE ${i + 1}: ${c.name}
CV/Background: ${c.cv}
Physical Specs: ${c.specs || 'Not provided'}
Reel/Portfolio: ${c.reel || 'Not provided'}
Agent: ${c.agent || 'Not provided'}
`).join('\n')}

Please respond ONLY with a valid JSON object in this exact structure:
{
  "recommendation": "One sentence stating who you recommend most and why",
  "candidates": [
    {
      "name": "candidate name",
      "match_score": "Strong / Good / Partial",
      "strengths": "2-3 sentences on why they fit",
      "considerations": "1-2 sentences on any gaps or flags",
      "availability_note": "Any note on availability alignment if dates were provided"
    }
  ],
  "outreach": [
    {
      "name": "candidate name",
      "agent": "agent contact if provided",
      "message": "A professional, warm email draft to the agent (or candidate if no agent) proposing an audition. Include the production name, dates, and a genuine compliment about the candidate's work. Sign off as the casting team."
    }
  ]
}

Return only the JSON, no other text.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const raw = data.content[0].text.trim();
    const json = JSON.parse(raw.replace(/^```json\n?/, '').replace(/\n?```$/, ''));

    renderResults(json, candidates.length);

  } catch (e) {
    showError('Something went wrong: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function renderResults(data, count) {
  // Recommendation
  document.getElementById('recommendationText').textContent = data.recommendation;
  document.getElementById('resultsMeta').textContent =
    `${count} candidate${count > 1 ? 's' : ''} analysed`;

  // Candidate cards
  const cardsEl = document.getElementById('resultCards');
  cardsEl.innerHTML = data.candidates.map(c => `
    <div class="result-card">
      <div class="result-card-header">
        <div class="result-card-name">${c.name}</div>
        <div class="result-card-score">${c.match_score}</div>
      </div>
      <div class="result-card-body">
        <strong>Strengths</strong>${c.strengths}
        <strong>Considerations</strong>${c.considerations}
        ${c.availability_note ? `<strong>Availability</strong>${c.availability_note}` : ''}
      </div>
    </div>
  `).join('');

  // Outreach
  const outreachEl = document.getElementById('outreachGrid');
  outreachEl.innerHTML = data.outreach.map((o, i) => `
    <div class="outreach-card">
      <div class="outreach-card-header">
        <div>
          <div class="outreach-label">Draft for ${o.name}</div>
          ${o.agent ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem;">${o.agent}</div>` : ''}
        </div>
        <button class="copy-btn" onclick="copyText(this, 'msg${i}')">Copy</button>
      </div>
      <div class="outreach-body" id="msg${i}">${o.message}</div>
    </div>
  `).join('');

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText(btn, id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
</script>
</body>
</html>
